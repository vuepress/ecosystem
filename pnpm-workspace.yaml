packages:
  - docs/
  - e2e/
  - plugins/*/*
  - themes/*
  - tools/*

catalog:
  '@vuepress/bundler-vite': 2.0.0-rc.29
  '@vuepress/bundler-webpack': 2.0.0-rc.29
  '@vueuse/core': ^14.3.0
  chokidar: ^5.0.0
  sass: ^1.99.0
  sass-embedded: ^1.99.0
  sass-loader: ^16.0.8
  vue: ^3.5.34
  vuepress: 2.0.0-rc.29

catalogMode: prefer

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

minimumReleaseAgeExclude:
  - '@vuepress/*'
  - vuepress

overrides:
  rolldown: ^1.0.0

peerDependencyRules:
  allowedVersions:
    artalk>marked: ^17.0.0
    echarts-wordcloud>echarts: ^6.0.0

cleanupUnusedCatalogs: true
