packages:
  - docs/
  - e2e/
  - plugins/*/*
  - themes/*
  - tools/*

catalog:
  '@vuepress/bundler-vite': 2.0.0-rc.30
  '@vuepress/bundler-webpack': 2.0.0-rc.30
  '@vueuse/core': ^14.3.0
  chokidar: ^5.0.0
  sass: ^1.100.0
  sass-embedded: ^1.100.0
  sass-loader: ^17.0.0
  vue: ^3.5.35
  vuepress: 2.0.0-rc.30

catalogMode: prefer

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

minimumReleaseAgeExclude:
  - '@vue/*'
  - '@vuepress/*'
  - vue
  - vuepress

packageExtensions:
  stylelint:
    peerDependencies:
      postcss-html: ^1.8.1
    peerDependenciesMeta:
      postcss-html:
        optional: true

  # FIXME: avoid missing type declaration
  # https://github.com/unjs/unplugin/issues/605
  unplugin:
    peerDependencies:
      rollup: ^4.0.0
      vite: ^8.0.0
      webpack: ^5.0.0
    peerDependenciesMeta:
      rollup:
        optional: true
      vite:
        optional: true
      webpack:
        optional: true

peerDependencyRules:
  allowedVersions:
    artalk>marked: ^17.0.0
    echarts-wordcloud>echarts: ^6.0.0

cleanupUnusedCatalogs: true

configDependencies:
  pacquet: ^0.11.11
