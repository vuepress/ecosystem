packages:
  - docs/
  - e2e/
  - plugins/*/*
  - themes/*
  - tools/*

catalog:
  '@vuepress/bundler-vite': 2.0.0-rc.30
  '@vuepress/bundler-webpack': 2.0.0-rc.30
  '@vueuse/core': ^14.3.0
  chokidar: ^5.0.0
  sass: ^1.100.0
  sass-embedded: ^1.100.0
  sass-loader: ^17.0.0
  vue: ^3.5.34
  vuepress: 2.0.0-rc.30

catalogMode: prefer

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

minimumReleaseAgeExclude:
  - '@vuepress/*'
  - vuepress

peerDependencyRules:
  allowedVersions:
    artalk>marked: ^17.0.0
    echarts-wordcloud>echarts: ^6.0.0

cleanupUnusedCatalogs: true

configDependencies:
  pacquet: '^0.2.9'
