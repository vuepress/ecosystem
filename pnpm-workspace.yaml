packages:
  - docs/
  - e2e/
  - plugins/*/*
  - themes/*
  - tools/*

catalog:
  '@vuepress/bundler-vite': 2.0.0-rc.28
  '@vuepress/bundler-webpack': 2.0.0-rc.28
  '@vueuse/core': ^14.3.0
  chokidar: ^5.0.0
  sass: ^1.99.0
  sass-embedded: ^1.99.0
  sass-loader: ^16.0.7
  vue: ^3.5.33
  vuepress: 2.0.0-rc.28

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

peerDependencyRules:
  allowedVersions:
    artalk>marked: ^17.0.0
    echarts-wordcloud>echarts: ^6.0.0
