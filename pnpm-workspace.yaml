packages:
  - docs/
  - e2e/
  - plugins/*/*
  - themes/*
  - tools/*

catalog:
  '@vuepress/bundler-vite': 2.0.0-rc.27
  '@vuepress/bundler-webpack': 2.0.0-rc.27
  '@vueuse/core': ^14.2.1
  chokidar: ^5.0.0
  sass: ^1.98.0
  sass-embedded: ^1.98.0
  sass-loader: ^16.0.7
  vue: ^3.5.31
  vuepress: 2.0.0-rc.27

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild

overrides:
  vite@7: npm:vite@^8.0.0-beta.18

peerDependencyRules:
  allowedVersions:
    artalk>marked: ^17.0.0
    echarts-wordcloud@2>echarts: '6'
