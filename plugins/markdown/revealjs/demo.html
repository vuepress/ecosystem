## Transition

<!-- .element: class="r-fit-text" -->

Transition can be changed by setting the `transition` config option globally or `data-transition` attribute on slide.

Possible values:

- none
- fade
- slide

- zoom

You can use `[a-b|c-d]` syntax to highlight lines by steps.

const a = 1
const b = 2
const c = (x) => 1 + 2 + x
c(3)
